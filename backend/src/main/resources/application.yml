server:
  port: 8080
  servlet:
    session:
      timeout: 30m

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: ai-agent-platform-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_agent_platform}
    username: ${DB_USERNAME:aiclub}
    password: ${DB_PASSWORD:aiclub123}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5s
      repositories:
        enabled: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:aiclub}
    password: ${RABBITMQ_PASSWORD:aiclub123}
    virtual-host: ${RABBITMQ_VHOST:/}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    encoding: UTF-8
    out-of-order: true
    ignore-migration-patterns:
      - "*:future"
      - "*:missing"
    clean-disabled: true
  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB
  mvc:
    async:
      # 执行中心 run 级 SSE 可能需要覆盖完整的长时实现步骤，5 分钟会让连接被动断开后频繁重连。
      request-timeout: 3900000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

platform:
  code-processing:
    base-url: http://localhost:9000
  gitpilot:
    cli:
      enabled: ${PLATFORM_GITPILOT_CLI_ENABLED:true}
      device-code-ttl-seconds: ${PLATFORM_GITPILOT_CLI_DEVICE_CODE_TTL_SECONDS:600}
      poll-interval-seconds: ${PLATFORM_GITPILOT_CLI_POLL_INTERVAL_SECONDS:5}
      token-ttl-days: ${PLATFORM_GITPILOT_CLI_TOKEN_TTL_DAYS:30}
      model-session-ttl-seconds: ${PLATFORM_GITPILOT_CLI_MODEL_SESSION_TTL_SECONDS:900}
      model-proxy-timeout-seconds: ${PLATFORM_GITPILOT_CLI_MODEL_PROXY_TIMEOUT_SECONDS:180}
      model-proxy-max-request-bytes: ${PLATFORM_GITPILOT_CLI_MODEL_PROXY_MAX_REQUEST_BYTES:4194304}
      public-base-url: ${PLATFORM_GITPILOT_CLI_PUBLIC_BASE_URL:${PLATFORM_FRONTEND_PUBLIC_BASE_URL:http://localhost:3000}}
  gitnexus:
    enabled: ${PLATFORM_GITNEXUS_ENABLED:true}
    ui-public-base-url: ${PLATFORM_GITNEXUS_UI_PUBLIC_BASE_URL:}
    ui-public-port: ${PLATFORM_GITNEXUS_UI_PUBLIC_PORT:5174}
    serve-public-base-url: ${PLATFORM_GITNEXUS_SERVE_PUBLIC_BASE_URL:}
    serve-public-port: ${PLATFORM_GITNEXUS_SERVE_PUBLIC_PORT:4747}
  gitlab:
    default-api-url: ${PLATFORM_GITLAB_DEFAULT_API_URL:}
    oauth:
      client-id: ${PLATFORM_GITLAB_OAUTH_CLIENT_ID:}
      client-secret: ${PLATFORM_GITLAB_OAUTH_CLIENT_SECRET:}
      redirect-uri: ${PLATFORM_GITLAB_OAUTH_REDIRECT_URI:}
      state-expire-minutes: ${PLATFORM_GITLAB_OAUTH_STATE_EXPIRE_MINUTES:10}
  auto-merge:
    log:
      retention-days: ${PLATFORM_AUTO_MERGE_LOG_RETENTION_DAYS:5}
      cleanup-interval-ms: ${PLATFORM_AUTO_MERGE_LOG_CLEANUP_INTERVAL_MS:3600000}
  frontend:
    public-base-url: ${PLATFORM_FRONTEND_PUBLIC_BASE_URL:}
  woodpecker:
    enabled: ${WOODPECKER_ENABLED:true}
    internal-base-url: ${PLATFORM_WOODPECKER_INTERNAL_BASE_URL:http://localhost:18000}
    public-base-url: ${PLATFORM_WOODPECKER_PUBLIC_BASE_URL:http://localhost:18000}
    api-token: ${PLATFORM_WOODPECKER_API_TOKEN:}
    timeout-seconds: ${PLATFORM_WOODPECKER_TIMEOUT_SECONDS:20}
  cicd:
    public-base-url: ${PLATFORM_CICD_PUBLIC_BASE_URL:}
    run-sync:
      fixed-delay-ms: ${PLATFORM_CICD_RUN_SYNC_FIXED_DELAY_MS:30000}
      fetch-limit: ${PLATFORM_CICD_RUN_SYNC_FETCH_LIMIT:10}
    callback-delivery:
      fixed-delay-ms: ${PLATFORM_CICD_CALLBACK_DELIVERY_FIXED_DELAY_MS:10000}
      max-attempts: ${PLATFORM_CICD_CALLBACK_DELIVERY_MAX_ATTEMPTS:5}
  pr-review:
    oa-base-url: ${PLATFORM_PR_REVIEW_OA_BASE_URL:}
    default-dev-group-name: ${PLATFORM_PR_REVIEW_DEFAULT_DEV_GROUP_NAME:}
    oa-user-id: ${PLATFORM_PR_REVIEW_OA_USER_ID:}
    oa-token: ${PLATFORM_PR_REVIEW_OA_TOKEN:}
  gitee:
    default-api-url: ${PLATFORM_GITEE_DEFAULT_API_URL:}
    binding:
      enterprise-id: ${PLATFORM_GITEE_BINDING_ENTERPRISE_ID:}
      access-token: ${PLATFORM_GITEE_BINDING_ACCESS_TOKEN:}
    test-push:
      test-plan-assignee-id: ${PLATFORM_GITEE_TEST_PUSH_TEST_PLAN_ASSIGNEE_ID:}
      test-case-module-id: ${PLATFORM_GITEE_TEST_PUSH_TEST_CASE_MODULE_ID:}
      test-case-type: ${PLATFORM_GITEE_TEST_PUSH_TEST_CASE_TYPE:}
  hermes:
    base-url: ${PLATFORM_HERMES_BASE_URL:}
    api-key: ${PLATFORM_HERMES_API_KEY:}
    model: ${PLATFORM_HERMES_MODEL:}
    timeout-seconds: ${PLATFORM_HERMES_TIMEOUT_SECONDS:}
    session-prefix: ${PLATFORM_HERMES_SESSION_PREFIX:ai-club:hermes}
    max-context-messages: ${PLATFORM_HERMES_MAX_CONTEXT_MESSAGES:6}
    grounding-ttl-seconds: ${PLATFORM_HERMES_GROUNDING_TTL_SECONDS:86400}
    speech:
      base-url: ${PLATFORM_HERMES_SPEECH_BASE_URL:}
      api-key: ${PLATFORM_HERMES_SPEECH_API_KEY:}
      model: ${PLATFORM_HERMES_SPEECH_MODEL:}
      timeout-seconds: ${PLATFORM_HERMES_SPEECH_TIMEOUT_SECONDS:}
  pi-runtime:
    base-url: ${PLATFORM_PI_RUNTIME_BASE_URL:http://localhost:9010}
    service-token: ${PLATFORM_PI_RUNTIME_SERVICE_TOKEN:${PLATFORM_INTERNAL_SERVICE_TOKEN:git-ai-club-internal-service-token}}
  assistant:
    default-runtime-code: ${PLATFORM_GITPILOT_DEFAULT_RUNTIME_CODE:HERMES_LEGACY}
    external-mcp:
      # 环境变量管理中的数据库覆盖优先；此配置仅作为部署环境兜底。
      allowed-hosts: ${PLATFORM_ASSISTANT_EXTERNAL_MCP_ALLOWED_HOSTS:}
      connect-timeout-ms: ${PLATFORM_ASSISTANT_EXTERNAL_MCP_CONNECT_TIMEOUT_MS:5000}
      request-timeout-ms: ${PLATFORM_ASSISTANT_EXTERNAL_MCP_REQUEST_TIMEOUT_MS:20000}
  hindsight:
    base-url: ${HINDSIGHT_API_URL:}
    api-key: ${HINDSIGHT_API_KEY:}
    bank-prefix: ${HERMES_HINDSIGHT_BANK_ID:}
    recall-budget: ${HERMES_HINDSIGHT_BUDGET:}
    timeout-seconds: ${PLATFORM_HINDSIGHT_TIMEOUT_SECONDS:}
    memory-fact:
      project-bank-template: ${PLATFORM_HINDSIGHT_MEMORY_FACT_PROJECT_BANK_TEMPLATE:}
      shared-bank-id: ${PLATFORM_HINDSIGHT_MEMORY_FACT_SHARED_BANK_ID:}
      entity-graph-path-template: ${PLATFORM_HINDSIGHT_MEMORY_FACT_ENTITY_GRAPH_PATH_TEMPLATE:/v1/default/banks/{bankId}/graph}
      entity-detail-path-template: ${PLATFORM_HINDSIGHT_MEMORY_FACT_ENTITY_DETAIL_PATH_TEMPLATE:/v1/default/banks/{bankId}/entities/{entityId}}
      recall-path-template: ${PLATFORM_HINDSIGHT_MEMORY_FACT_RECALL_PATH_TEMPLATE:/v1/default/banks/{bankId}/memories/recall}
      database-fallback-enabled: ${PLATFORM_HINDSIGHT_MEMORY_FACT_DATABASE_FALLBACK_ENABLED:true}
      database-url: ${PLATFORM_HINDSIGHT_MEMORY_FACT_DATABASE_URL:jdbc:postgresql://localhost:5432/hindsight}
      database-username: ${PLATFORM_HINDSIGHT_MEMORY_FACT_DATABASE_USERNAME:${DB_USERNAME:aiclub}}
      database-password: ${PLATFORM_HINDSIGHT_MEMORY_FACT_DATABASE_PASSWORD:${DB_PASSWORD:aiclub123}}
  wiki-knowledge:
    enabled: ${PLATFORM_WIKI_KNOWLEDGE_ENABLED:true}
    qdrant:
      base-url: ${PLATFORM_WIKI_KNOWLEDGE_QDRANT_BASE_URL:http://localhost:6333}
      api-key: ${PLATFORM_WIKI_KNOWLEDGE_QDRANT_API_KEY:}
      timeout-seconds: ${PLATFORM_WIKI_KNOWLEDGE_QDRANT_TIMEOUT_SECONDS:20}
      project-collection: ${PLATFORM_WIKI_KNOWLEDGE_QDRANT_PROJECT_COLLECTION:wiki_project_chunks}
      space-collection: ${PLATFORM_WIKI_KNOWLEDGE_QDRANT_SPACE_COLLECTION:wiki_space_chunks}
    embedding:
      model-id: ${PLATFORM_WIKI_KNOWLEDGE_EMBEDDING_MODEL_ID:0}
      base-url: ${PLATFORM_WIKI_KNOWLEDGE_EMBEDDING_BASE_URL:}
      api-key: ${PLATFORM_WIKI_KNOWLEDGE_EMBEDDING_API_KEY:}
      model-name: ${PLATFORM_WIKI_KNOWLEDGE_EMBEDDING_MODEL_NAME:}
      provider: ${PLATFORM_WIKI_KNOWLEDGE_EMBEDDING_PROVIDER:OPENAI}
    search:
      vector-limit: ${PLATFORM_WIKI_KNOWLEDGE_VECTOR_LIMIT:12}
      candidate-limit: ${PLATFORM_WIKI_KNOWLEDGE_CANDIDATE_LIMIT:24}
    rerank:
      provider: ${PLATFORM_WIKI_KNOWLEDGE_RERANK_PROVIDER:openai-compatible}
      base-url: ${PLATFORM_WIKI_KNOWLEDGE_RERANK_BASE_URL:}
      api-key: ${PLATFORM_WIKI_KNOWLEDGE_RERANK_API_KEY:}
      model: ${PLATFORM_WIKI_KNOWLEDGE_RERANK_MODEL:}
      timeout-seconds: ${PLATFORM_WIKI_KNOWLEDGE_RERANK_TIMEOUT_SECONDS:15}
      top-k: ${PLATFORM_WIKI_KNOWLEDGE_RERANK_TOP_K:10}
  lightrag:
    enabled: ${PLATFORM_LIGHTRAG_ENABLED:true}
    # 阶段三切流开关：hermes 证据默认关闭灰度按需开启；图谱默认开启走 LightRAG+Neo4j。
    hermes-evidence-enabled: ${PLATFORM_LIGHTRAG_HERMES_EVIDENCE_ENABLED:false}
    graph-enabled: ${PLATFORM_LIGHTRAG_GRAPH_ENABLED:true}
    query:
      top-k: ${PLATFORM_LIGHTRAG_QUERY_TOP_K:3}
      default-mode: ${PLATFORM_LIGHTRAG_QUERY_DEFAULT_MODE:local}
    graph-node-limit: ${PLATFORM_LIGHTRAG_GRAPH_NODE_LIMIT:500}
    ingest:
      retry-max: ${PLATFORM_LIGHTRAG_INGEST_RETRY_MAX:5}
      scan-interval-ms: ${PLATFORM_LIGHTRAG_INGEST_SCAN_INTERVAL_MS:600000}
  internal:
    allow-local-bypass: ${PLATFORM_INTERNAL_ALLOW_LOCAL_BYPASS:true}
    service-token: ${PLATFORM_INTERNAL_SERVICE_TOKEN:git-ai-club-internal-service-token}
  observability:
    enabled: ${PLATFORM_OBSERVABILITY_ENABLED:true}
    ingest-token: ${PLATFORM_OBSERVABILITY_INGEST_TOKEN:git-ai-club-observability-token}
    log:
      collect-interval-ms: ${PLATFORM_PROJECT_LOG_COLLECT_INTERVAL_MS:30000}
      retention-days: ${PLATFORM_PROJECT_LOG_RETENTION_DAYS:14}
      chunk-bytes: ${PLATFORM_PROJECT_LOG_CHUNK_BYTES:262144}
    health:
      collect-interval-ms: ${PLATFORM_PROJECT_HEALTH_INTERVAL_MS:30000}
      retention-days: ${PLATFORM_PROJECT_HEALTH_RETENTION_DAYS:30}
      http-connect-timeout-ms: ${PLATFORM_PROJECT_HEALTH_HTTP_CONNECT_TIMEOUT_MS:3000}
      http-read-timeout-ms: ${PLATFORM_PROJECT_HEALTH_HTTP_READ_TIMEOUT_MS:5000}
  security:
    token-secret: ${PLATFORM_TOKEN_SECRET:ai-club-demo-token-secret}
    token-expire-hours: ${PLATFORM_TOKEN_EXPIRE_HOURS:12}
    session-key-prefix: ${PLATFORM_SECURITY_SESSION_KEY_PREFIX:ai-club:login:token:}
    cors:
      allowed-origin-patterns: '${PLATFORM_SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.*:*}'
  upload:
    max-image-size: 5MB
    max-document-size: 20MB
    minio:
      endpoint: ${PLATFORM_MINIO_ENDPOINT:http://localhost:19000}
      access-key: ${PLATFORM_MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${PLATFORM_MINIO_SECRET_KEY:minioadmin}
      bucket: ${PLATFORM_MINIO_BUCKET:ai-club-assets}
  execution:
    task:
      # 执行中心任务队列：数据库保存任务事实，RabbitMQ 只投递 executionTaskId 调度信号。
      rabbit:
        # 主交换机，统一承载执行任务主队列、延迟重试队列和死信队列路由。
        exchange: ${PLATFORM_EXECUTION_TASK_RABBIT_EXCHANGE:execution.task.exchange}
        # 主队列，消费者从这里领取待执行任务信号。
        queue-name: ${PLATFORM_EXECUTION_TASK_RABBIT_QUEUE:execution.task.queue}
        # 创建、重试确认和补偿扫描发布待执行任务时使用的主路由键。
        routing-key: ${PLATFORM_EXECUTION_TASK_RABBIT_ROUTING_KEY:execution.task}
        # 延迟重试队列，仅用于 claim 前或消息调度入口异常后的 MQ 级重试。
        retry-queue-name: ${PLATFORM_EXECUTION_TASK_RABBIT_RETRY_QUEUE:execution.task.retry.queue}
        # 投递到延迟重试队列时使用的路由键。
        retry-routing-key: ${PLATFORM_EXECUTION_TASK_RABBIT_RETRY_ROUTING_KEY:execution.task.retry}
        # 死信队列，超过最大 MQ 调度尝试次数后进入这里便于运维诊断。
        dead-letter-queue-name: ${PLATFORM_EXECUTION_TASK_RABBIT_DLQ:execution.task.dlq}
        # 投递到死信队列时使用的路由键。
        dead-letter-routing-key: ${PLATFORM_EXECUTION_TASK_RABBIT_DLQ_ROUTING_KEY:execution.task.dead}
        # MQ 级延迟重试等待时间，业务执行已开始后的失败不通过 MQ 重放。
        retry-delay-ms: ${PLATFORM_EXECUTION_TASK_RABBIT_RETRY_DELAY_MS:30000}
        # MQ 调度入口最大尝试次数，超过后写入 DLQ 并标记任务失败摘要。
        max-attempts: ${PLATFORM_EXECUTION_TASK_RABBIT_MAX_ATTEMPTS:3}
        # 执行中心消费者并发数，prefetch 固定为 1，避免单消费者预取过多长任务。
        consumer-concurrency: ${PLATFORM_EXECUTION_TASK_QUEUE_CONCURRENCY:2}
  wiki:
    sync:
      # Wiki Hindsight/知识索引同步队列：数据库同步任务表是事实源，RabbitMQ 只投递 syncTaskId 唤醒信号。
      rabbit:
        # 主交换机，统一承载 Wiki 同步主队列、延迟重试队列和死信队列路由。
        exchange: ${PLATFORM_WIKI_SYNC_RABBIT_EXCHANGE:wiki.sync.exchange}
        # 主队列，消费者从这里领取项目 Wiki 与空间化 Wiki 同步任务。
        queue-name: ${PLATFORM_WIKI_SYNC_RABBIT_QUEUE:wiki.sync.queue}
        # 主路由键，用于页面保存、重试和补偿扫描发布同步信号。
        routing-key: ${PLATFORM_WIKI_SYNC_RABBIT_ROUTING_KEY:wiki.sync}
        # 延迟重试队列，仅用于消费入口或 claim 前异常，业务同步失败继续走同步任务表退避。
        retry-queue-name: ${PLATFORM_WIKI_SYNC_RABBIT_RETRY_QUEUE:wiki.sync.retry.queue}
        # 投递到 Wiki 同步延迟重试队列时使用的路由键。
        retry-routing-key: ${PLATFORM_WIKI_SYNC_RABBIT_RETRY_ROUTING_KEY:wiki.sync.retry}
        # 死信队列，超过最大 MQ 调度尝试次数后进入这里便于运维诊断。
        dead-letter-queue-name: ${PLATFORM_WIKI_SYNC_RABBIT_DLQ:wiki.sync.dlq}
        # 投递到 Wiki 同步死信队列时使用的路由键。
        dead-letter-routing-key: ${PLATFORM_WIKI_SYNC_RABBIT_DLQ_ROUTING_KEY:wiki.sync.dead}
        # MQ 级延迟重试等待时间，单位毫秒。
        retry-delay-ms: ${PLATFORM_WIKI_SYNC_RABBIT_RETRY_DELAY_MS:30000}
        # MQ 调度入口最大尝试次数，业务同步自身重试次数仍由同步任务表 maxAttempts 控制。
        max-attempts: ${PLATFORM_WIKI_SYNC_RABBIT_MAX_ATTEMPTS:3}
        # Wiki 同步消费者并发数，prefetch 固定为 1，避免单消费者预取过多外部索引任务。
        consumer-concurrency: ${PLATFORM_WIKI_SYNC_QUEUE_CONCURRENCY:2}
  chat:
    agent:
      rabbit:
        exchange: ${PLATFORM_CHAT_AGENT_RABBIT_EXCHANGE:chat.agent.exchange}
        queue-name: ${PLATFORM_CHAT_AGENT_RABBIT_QUEUE:chat.agent.task.queue}
        routing-key: ${PLATFORM_CHAT_AGENT_RABBIT_ROUTING_KEY:chat.agent.task}
        retry-queue-name: ${PLATFORM_CHAT_AGENT_RABBIT_RETRY_QUEUE:chat.agent.retry.queue}
        retry-routing-key: ${PLATFORM_CHAT_AGENT_RABBIT_RETRY_ROUTING_KEY:chat.agent.retry}
        dead-letter-queue-name: ${PLATFORM_CHAT_AGENT_RABBIT_DLQ:chat.agent.dlq}
        dead-letter-routing-key: ${PLATFORM_CHAT_AGENT_RABBIT_DLQ_ROUTING_KEY:chat.agent.dead}
        retry-delay-ms: ${PLATFORM_CHAT_AGENT_RABBIT_RETRY_DELAY_MS:30000}
        max-attempts: ${PLATFORM_CHAT_AGENT_RABBIT_MAX_ATTEMPTS:3}
        consumer-concurrency: ${PLATFORM_CHAT_AGENT_QUEUE_CONCURRENCY:2}
