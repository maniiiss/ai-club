server:
  port: 8080

spring:
  application:
    name: ai-agent-platform-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_agent_platform}
    username: ${DB_USERNAME:aiclub}
    password: ${DB_PASSWORD:aiclub123}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5s
      repositories:
        enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    encoding: UTF-8
    ignore-migration-patterns:
      - "*:future"
      - "*:missing"
    clean-disabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

platform:
  code-processing:
    base-url: http://localhost:9000
  gitlab:
    default-api-url: http://192.168.110.138:30080/api/v4
  security:
    token-secret: ${PLATFORM_TOKEN_SECRET:ai-club-demo-token-secret}
    token-expire-hours: ${PLATFORM_TOKEN_EXPIRE_HOURS:12}
    session-key-prefix: ${PLATFORM_SECURITY_SESSION_KEY_PREFIX:ai-club:login:token:}
  upload:
    max-image-size: 5MB
    minio:
      endpoint: ${PLATFORM_MINIO_ENDPOINT:http://localhost:19000}
      access-key: ${PLATFORM_MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${PLATFORM_MINIO_SECRET_KEY:minioadmin}
      bucket: ${PLATFORM_MINIO_BUCKET:ai-club-assets}
