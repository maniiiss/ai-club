server:
  port: 8080
  servlet:
    session:
      timeout: 30m

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: ai-agent-platform-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_agent_platform}
    username: ${DB_USERNAME:aiclub}
    password: ${DB_PASSWORD:aiclub123}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5s
      repositories:
        enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    encoding: UTF-8
    ignore-migration-patterns:
      - "*:future"
      - "*:missing"
    clean-disabled: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 64MB
  mvc:
    async:
      # 执行中心 run 级 SSE 可能需要覆盖完整的长时实现步骤，5 分钟会让连接被动断开后频繁重连。
      request-timeout: 3900000

management:
  endpoints:
    web:
      exposure:
        include: health,info

platform:
  code-processing:
    base-url: http://localhost:9000
  gitnexus:
    enabled: ${PLATFORM_GITNEXUS_ENABLED:true}
    ui-public-base-url: ${PLATFORM_GITNEXUS_UI_PUBLIC_BASE_URL:}
    ui-public-port: ${PLATFORM_GITNEXUS_UI_PUBLIC_PORT:5174}
    serve-public-base-url: ${PLATFORM_GITNEXUS_SERVE_PUBLIC_BASE_URL:}
    serve-public-port: ${PLATFORM_GITNEXUS_SERVE_PUBLIC_PORT:4747}
  gitlab:
    default-api-url: http://192.168.110.138:30080/api/v4
    oauth:
      client-id: ${PLATFORM_GITLAB_OAUTH_CLIENT_ID:}
      client-secret: ${PLATFORM_GITLAB_OAUTH_CLIENT_SECRET:}
      redirect-uri: ${PLATFORM_GITLAB_OAUTH_REDIRECT_URI:http://localhost:5173/profile/gitlab-callback}
      state-expire-minutes: ${PLATFORM_GITLAB_OAUTH_STATE_EXPIRE_MINUTES:10}
  gitee:
    default-api-url: ${PLATFORM_GITEE_DEFAULT_API_URL:https://api.gitee.com/enterprises}
    test-push:
      test-plan-assignee-id: ${PLATFORM_GITEE_TEST_PUSH_TEST_PLAN_ASSIGNEE_ID:9917662}
      test-case-module-id: ${PLATFORM_GITEE_TEST_PUSH_TEST_CASE_MODULE_ID:229413}
      test-case-type: ${PLATFORM_GITEE_TEST_PUSH_TEST_CASE_TYPE:2}
  hermes:
    base-url: ${PLATFORM_HERMES_BASE_URL:http://localhost:18080/v1}
    api-key: ${PLATFORM_HERMES_API_KEY:}
    model: ${PLATFORM_HERMES_MODEL:hermes-agent}
    timeout-seconds: ${PLATFORM_HERMES_TIMEOUT_SECONDS:180}
    session-prefix: ${PLATFORM_HERMES_SESSION_PREFIX:ai-club:hermes}
    max-context-messages: ${PLATFORM_HERMES_MAX_CONTEXT_MESSAGES:6}
    grounding-ttl-seconds: ${PLATFORM_HERMES_GROUNDING_TTL_SECONDS:86400}
    speech:
      base-url: ${PLATFORM_HERMES_SPEECH_BASE_URL:https://api.openai.com/v1}
      api-key: ${PLATFORM_HERMES_SPEECH_API_KEY:}
      model: ${PLATFORM_HERMES_SPEECH_MODEL:gpt-4o-mini-transcribe}
      timeout-seconds: ${PLATFORM_HERMES_SPEECH_TIMEOUT_SECONDS:60}
  hindsight:
    base-url: ${HINDSIGHT_API_URL:http://localhost:18888}
    api-key: ${HINDSIGHT_API_KEY:}
    bank-prefix: ${HERMES_HINDSIGHT_BANK_ID:git-ai-club}
    recall-budget: ${HERMES_HINDSIGHT_BUDGET:mid}
    timeout-seconds: ${PLATFORM_HINDSIGHT_TIMEOUT_SECONDS:30}
    memory-fact:
      project-bank-template: ${PLATFORM_HINDSIGHT_MEMORY_FACT_PROJECT_BANK_TEMPLATE:}
      shared-bank-id: ${PLATFORM_HINDSIGHT_MEMORY_FACT_SHARED_BANK_ID:}
      entity-graph-path-template: ${PLATFORM_HINDSIGHT_MEMORY_FACT_ENTITY_GRAPH_PATH_TEMPLATE:/v1/default/banks/{bankId}/graph}
      entity-detail-path-template: ${PLATFORM_HINDSIGHT_MEMORY_FACT_ENTITY_DETAIL_PATH_TEMPLATE:/v1/default/banks/{bankId}/entities/{entityId}}
      recall-path-template: ${PLATFORM_HINDSIGHT_MEMORY_FACT_RECALL_PATH_TEMPLATE:/v1/default/banks/{bankId}/memories/recall}
      database-fallback-enabled: ${PLATFORM_HINDSIGHT_MEMORY_FACT_DATABASE_FALLBACK_ENABLED:true}
      database-url: ${PLATFORM_HINDSIGHT_MEMORY_FACT_DATABASE_URL:jdbc:postgresql://localhost:5432/hindsight}
      database-username: ${PLATFORM_HINDSIGHT_MEMORY_FACT_DATABASE_USERNAME:${DB_USERNAME:aiclub}}
      database-password: ${PLATFORM_HINDSIGHT_MEMORY_FACT_DATABASE_PASSWORD:${DB_PASSWORD:aiclub123}}
  internal:
    allow-local-bypass: ${PLATFORM_INTERNAL_ALLOW_LOCAL_BYPASS:true}
    service-token: ${PLATFORM_INTERNAL_SERVICE_TOKEN:git-ai-club-internal-service-token}
  security:
    token-secret: ${PLATFORM_TOKEN_SECRET:ai-club-demo-token-secret}
    token-expire-hours: ${PLATFORM_TOKEN_EXPIRE_HOURS:12}
    session-key-prefix: ${PLATFORM_SECURITY_SESSION_KEY_PREFIX:ai-club:login:token:}
  upload:
    max-image-size: 5MB
    max-document-size: 20MB
    minio:
      endpoint: ${PLATFORM_MINIO_ENDPOINT:http://localhost:19000}
      access-key: ${PLATFORM_MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${PLATFORM_MINIO_SECRET_KEY:minioadmin}
      bucket: ${PLATFORM_MINIO_BUCKET:ai-club-assets}
