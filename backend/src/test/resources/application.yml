spring:
  datasource:
    url: jdbc:h2:mem:ai_agent_platform_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai

platform:
  code-processing:
    base-url: http://localhost:9000
  gitlab:
    default-api-url: http://localhost:30080/api/v4
  hermes:
    base-url: http://localhost:18080/v1
    api-key:
    model: hermes-agent
    timeout-seconds: 180
    session-prefix: "test:hermes"
    max-context-messages: 4
  security:
    token-secret: test-token-secret
    session-key-prefix: "test:session:"
  upload:
    minio:
      endpoint: http://localhost:19000
      access-key: minioadmin
      secret-key: minioadmin
      bucket: ai-club-assets
