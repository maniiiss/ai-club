services:
  postgres:
    image: ${POSTGRES_IMAGE:-timescale/timescaledb-ha:pg16}
    container_name: ai-agent-platform-postgres
    user: "0:0"
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_platform}
      POSTGRES_USER: ${POSTGRES_USER:-aiclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiclub123}
      HINDSIGHT_POSTGRES_DB: ${HINDSIGHT_POSTGRES_DB:-hindsight}
      HINDSIGHT_API_VECTOR_EXTENSION: ${HINDSIGHT_API_VECTOR_EXTENSION:-pgvectorscale}
      TZ: ${APP_TZ:-Asia/Shanghai}
      PGTZ: ${APP_TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # 源码模式优先复用 ./.data/postgres，兼容升级前的本地数据目录。
      - "${POSTGRES_DATA_DIR:-./.data/postgres}:/home/postgres/pgdata"
      # 初始化 Hindsight 专用数据库与 pgvector 扩展；仅在 PGDATA 首次初始化时执行。
      - "./docker/postgres/init:/docker-entrypoint-initdb.d:ro"
      - "./docker/postgres/bin:/opt/git-ai-club/postgres/bin:ro"
    entrypoint:
      - /bin/sh
      - /opt/git-ai-club/postgres/bin/start-postgres-with-auto-pgdata.sh
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-aiclub} -d ${POSTGRES_DB:-ai_agent_platform}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-bootstrap:
    image: ${POSTGRES_IMAGE:-timescale/timescaledb-ha:pg16}
    container_name: git-ai-club-postgres-bootstrap
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_platform}
      POSTGRES_USER: ${POSTGRES_USER:-aiclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiclub123}
      HINDSIGHT_POSTGRES_DB: ${HINDSIGHT_POSTGRES_DB:-hindsight}
      HINDSIGHT_API_VECTOR_EXTENSION: ${HINDSIGHT_API_VECTOR_EXTENSION:-pgvectorscale}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    volumes:
      - "./docker/postgres/init:/docker-entrypoint-initdb.d:ro"
    # 单实例模式下统一补偿业务库与 Hindsight 库扩展。
    entrypoint:
      - /bin/sh
      - /docker-entrypoint-initdb.d/10-init-hindsight-db.sh

  code-processing:
    profiles:
      - embedded-code-processing
    build:
      context: ./code-processing
      dockerfile: Dockerfile
    image: ${CODE_PROCESSING_IMAGE:-git-ai-club-code-processing:latest}
    container_name: git-ai-club-code-processing
    restart: unless-stopped
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      PLATFORM_BACKEND_INTERNAL_BASE_URL: ${PLATFORM_BACKEND_INTERNAL_BASE_URL:-http://localhost:8080}
      PLATFORM_INTERNAL_SERVICE_TOKEN: ${PLATFORM_INTERNAL_SERVICE_TOKEN:-git-ai-club-internal-service-token}
      PLATFORM_HERMES_MCP_SHARED_TOKEN: ${PLATFORM_HERMES_MCP_SHARED_TOKEN:-git-ai-club-hermes-mcp-token}
      PLATFORM_MINIO_ENDPOINT: ${PLATFORM_MINIO_ENDPOINT:-http://host.docker.internal:19000}
      PLATFORM_MINIO_ACCESS_KEY: ${PLATFORM_MINIO_ACCESS_KEY:-minioadmin}
      PLATFORM_MINIO_SECRET_KEY: ${PLATFORM_MINIO_SECRET_KEY:-minioadmin}
      PLATFORM_MINIO_BUCKET: ${PLATFORM_MINIO_BUCKET:-ai-club-assets}
      PLATFORM_SCAN_WORKSPACE_ROOT: ${PLATFORM_SCAN_WORKSPACE_ROOT:-/tmp/git-ai-club-scans}
      # 透传 Codex / Claude Code CLI 配置，避免容器内回落到不符合预期的默认值。
      PLATFORM_CODEX_CLI_PATH: ${PLATFORM_CODEX_CLI_PATH:-}
      PLATFORM_CODEX_MODEL_PROVIDER: ${PLATFORM_CODEX_MODEL_PROVIDER:-}
      PLATFORM_CODEX_REASONING_EFFORT: ${PLATFORM_CODEX_REASONING_EFFORT:-low}
      PLATFORM_CLAUDE_CLI_PATH: ${PLATFORM_CLAUDE_CLI_PATH:-}
      PLATFORM_CLAUDE_MODEL: ${PLATFORM_CLAUDE_MODEL:-}
    ports:
      - "${CODE_PROCESSING_PORT:-9000}:9000"
    volumes:
      - "${PLATFORM_SCAN_HOST_PATH:-./.data/scans}:${PLATFORM_SCAN_WORKSPACE_ROOT:-/tmp/git-ai-club-scans}"

  redis:
    image: ${REDIS_IMAGE:-redis:7.4.8}
    container_name: git-ai-club-redis
    restart: unless-stopped
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\";
      else
        redis-server --appendonly yes;
      fi"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - "${REDIS_DATA_DIR:-./.data/redis}:/data"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping; else redis-cli ping; fi',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-02-28T09-55-16Z}
    container_name: git-ai-club-minio
    restart: unless-stopped
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      MINIO_ROOT_USER: ${PLATFORM_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${PLATFORM_MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - "${MINIO_DATA_DIR:-./.data/minio}:/data"

  hindsight:
    image: ${HINDSIGHT_IMAGE:-ghcr.io/vectorize-io/hindsight:latest}
    container_name: git-ai-club-hindsight
    restart: unless-stopped
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      HINDSIGHT_API_LLM_PROVIDER: ${HINDSIGHT_API_LLM_PROVIDER:-openai}
      HINDSIGHT_API_LLM_BASE_URL: ${HINDSIGHT_API_LLM_BASE_URL:-https://api.openai.com/v1}
      HINDSIGHT_API_LLM_API_KEY: ${HINDSIGHT_API_LLM_API_KEY:-}
      HINDSIGHT_API_LLM_MODEL: ${HINDSIGHT_API_LLM_MODEL:-gpt-4o-mini}
      # 外部 LLM 临时限流或欠费时，也要先把 Hindsight 拉起来，保障 recall / 实体图等只读链路可用。
      # 真正需要 LLM 的 retain / reflect / consolidation 请求会在单次调用时再明确报错。
      HINDSIGHT_API_SKIP_LLM_VERIFICATION: ${HINDSIGHT_API_SKIP_LLM_VERIFICATION:-true}
      HINDSIGHT_API_EMBEDDINGS_PROVIDER: ${HINDSIGHT_API_EMBEDDINGS_PROVIDER:-openai}
      HINDSIGHT_API_EMBEDDINGS_LOCAL_MODEL: ${HINDSIGHT_API_EMBEDDINGS_LOCAL_MODEL:-BAAI/bge-small-en-v1.5}
      HINDSIGHT_API_EMBEDDINGS_OPENAI_BASE_URL: ${HINDSIGHT_API_EMBEDDINGS_OPENAI_BASE_URL:-http://host.docker.internal:8000/v1}
      HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY: ${HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY:-local}
      HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL: ${HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL:-Qwen/Qwen3-Embedding-4B}
      HINDSIGHT_API_RERANKER_PROVIDER: ${HINDSIGHT_API_RERANKER_PROVIDER:-rrf}
      HINDSIGHT_API_RERANKER_LOCAL_MODEL: ${HINDSIGHT_API_RERANKER_LOCAL_MODEL:-BAAI/bge-reranker-v2-m3}
      HINDSIGHT_API_RERANKER_LITELLM_API_BASE: ${HINDSIGHT_API_RERANKER_LITELLM_API_BASE:-http://host.docker.internal:4000}
      HINDSIGHT_API_RERANKER_LITELLM_API_KEY: ${HINDSIGHT_API_RERANKER_LITELLM_API_KEY:-}
      HINDSIGHT_API_RERANKER_LITELLM_MODEL: ${HINDSIGHT_API_RERANKER_LITELLM_MODEL:-cohere/rerank-english-v3.0}
      # Hindsight 与业务后端共用同一 PostgreSQL 服务，通过独立数据库名隔离数据。
      HINDSIGHT_API_DATABASE_URL: postgresql://${POSTGRES_USER:-aiclub}:${POSTGRES_PASSWORD:-aiclub123}@postgres:${POSTGRES_PORT:-5432}/${HINDSIGHT_POSTGRES_DB:-hindsight}
      HINDSIGHT_API_VECTOR_EXTENSION: ${HINDSIGHT_API_VECTOR_EXTENSION:-pgvectorscale}
      HF_ENDPOINT: https://hf-mirror.com
    ports:
      - "${HINDSIGHT_PORT:-18888}:8888"
      - "${HINDSIGHT_CONSOLE_PORT:-19999}:9999"

  hermes:
    build:
      context: ./docker/hermes
      dockerfile: Dockerfile
    image: ${HERMES_IMAGE:-git-ai-club-hermes:latest}
    container_name: git-ai-club-hermes
    restart: unless-stopped
    depends_on:
      hindsight:
        condition: service_started
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      HERMES_HOME: /opt/data
      HERMES_LLM_PROVIDER: ${HERMES_LLM_PROVIDER:-}
      HERMES_LLM_MODEL: ${HERMES_LLM_MODEL:-MiniMax-M2.5}
      HERMES_LLM_API_KEY: ${HERMES_LLM_API_KEY:-}
      HERMES_LLM_BASE_URL: ${HERMES_LLM_BASE_URL:-}
      HERMES_MEMORY_PROVIDER: hindsight
      HERMES_MEMORY_HINDSIGHT_URL: "http://${SERVER_HOST:-hindsight}:${HINDSIGHT_PORT:-8888}"
      HINDSIGHT_API_URL: "http://${SERVER_HOST:-hindsight}:${HINDSIGHT_PORT:-8888}"
      HINDSIGHT_API_KEY: local
      HINDSIGHT_LLM_API_KEY: ${HERMES_LLM_API_KEY:-}
      CODE_PROCESSING_IP: ${CODE_PROCESSING_IP:-host.docker.internal}
      CODE_PROCESSING_PORT: ${CODE_PROCESSING_PORT:-9000}
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 18080
      API_SERVER_KEY: ${PLATFORM_HERMES_API_KEY:-}
      API_SERVER_MODEL_NAME: ${PLATFORM_HERMES_MODEL:-hermes-agent}
      PLATFORM_HERMES_MCP_SHARED_TOKEN: ${PLATFORM_HERMES_MCP_SHARED_TOKEN:-git-ai-club-hermes-mcp-token}
    entrypoint:
      - /bin/sh
      - -lc
      - |
        mkdir -p /opt/data
        # 兼容第三方 OpenAI 兼容网关：只要配置了 base_url，就自动切换成 custom provider。
        MODEL_PROVIDER="$${HERMES_LLM_PROVIDER:-}"
        if [ -z "$$MODEL_PROVIDER" ]; then
          if [ -n "$${HERMES_LLM_BASE_URL:-}" ]; then
            MODEL_PROVIDER="custom"
          else
            MODEL_PROVIDER="minimax-cn"
          fi
        fi
        MCP_HOST="$${CODE_PROCESSING_IP:-host.docker.internal}"
        MCP_PORT="$${CODE_PROCESSING_PORT:-9000}"
        {
          echo "model:"
          echo "  provider: $$MODEL_PROVIDER"
          echo "  default: $${HERMES_LLM_MODEL:-MiniMax-M2.5}"
          if [ -n "$${HERMES_LLM_BASE_URL:-}" ]; then
            echo "  base_url: $${HERMES_LLM_BASE_URL}"
          fi
          if [ -n "$${HERMES_LLM_API_KEY:-}" ]; then
            echo "  api_key: $${HERMES_LLM_API_KEY}"
          fi
          echo "memory:"
          echo "  provider: $${HERMES_MEMORY_PROVIDER:-hindsight}"
          if [ -n "$${HERMES_MEMORY_HINDSIGHT_URL:-}" ]; then
            echo "  hindsight_url: $${HERMES_MEMORY_HINDSIGHT_URL}"
          fi
          echo "platform_toolsets:"
          echo "  api_server:"
          echo "    - git_ai_club"
          echo "mcp_servers:"
          echo "  git_ai_club:"
          echo "    url: http://$$MCP_HOST:$$MCP_PORT/mcp/"
          echo "    headers:"
          echo "      Authorization: Bearer ${PLATFORM_HERMES_MCP_SHARED_TOKEN:-git-ai-club-hermes-mcp-token}"
          echo "    enabled: true"
          echo "    tools:"
          echo "      resources: false"
          echo "      prompts: false"
        } > /opt/data/config.yaml
        exec hermes gateway
    command: []
    ports:
      - "${HERMES_PORT:-18080}:18080"
    volumes:
      - "${HERMES_DATA_DIR:-./.data/hermes}:/opt/data"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-git-ai-club-backend:latest}
    container_name: git-ai-club-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      hermes:
        condition: service_started
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ai_agent_platform}
      DB_USERNAME: ${POSTGRES_USER:-aiclub}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-aiclub123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      PLATFORM_CODE_PROCESSING_BASE_URL: http://host.docker.internal:${CODE_PROCESSING_PORT:-9000}
      PLATFORM_HERMES_BASE_URL: http://hermes:18080/v1
      PLATFORM_HERMES_API_KEY: ${PLATFORM_HERMES_API_KEY:-}
      PLATFORM_HERMES_MODEL: ${PLATFORM_HERMES_MODEL:-hermes-agent}
      PLATFORM_HERMES_TIMEOUT_SECONDS: ${PLATFORM_HERMES_TIMEOUT_SECONDS:-180}
      PLATFORM_HERMES_SESSION_PREFIX: ${PLATFORM_HERMES_SESSION_PREFIX:-ai-club:hermes}
      PLATFORM_HERMES_MAX_CONTEXT_MESSAGES: ${PLATFORM_HERMES_MAX_CONTEXT_MESSAGES:-6}
      PLATFORM_HERMES_GROUNDING_TTL_SECONDS: ${PLATFORM_HERMES_GROUNDING_TTL_SECONDS:-86400}
      PLATFORM_HINDSIGHT_TIMEOUT_SECONDS: ${PLATFORM_HINDSIGHT_TIMEOUT_SECONDS:-30}
      PLATFORM_HINDSIGHT_MEMORY_FACT_DATABASE_URL: jdbc:postgresql://postgres:5432/${HINDSIGHT_POSTGRES_DB:-hindsight}
      PLATFORM_INTERNAL_SERVICE_TOKEN: ${PLATFORM_INTERNAL_SERVICE_TOKEN:-git-ai-club-internal-service-token}
      PLATFORM_GITLAB_DEFAULT_API_URL: ${PLATFORM_GITLAB_DEFAULT_API_URL:-http://192.168.110.138:30080/api/v4}
      PLATFORM_GITLAB_OAUTH_CLIENT_ID: ${PLATFORM_GITLAB_OAUTH_CLIENT_ID:-}
      PLATFORM_GITLAB_OAUTH_CLIENT_SECRET: ${PLATFORM_GITLAB_OAUTH_CLIENT_SECRET:-}
      PLATFORM_GITLAB_OAUTH_REDIRECT_URI: ${PLATFORM_GITLAB_OAUTH_REDIRECT_URI:-http://localhost:5173/profile/gitlab-callback}
      PLATFORM_TOKEN_SECRET: ${PLATFORM_TOKEN_SECRET:-ai-club-demo-token-secret}
      PLATFORM_TOKEN_EXPIRE_HOURS: ${PLATFORM_TOKEN_EXPIRE_HOURS:-12}
      PLATFORM_SECURITY_SESSION_KEY_PREFIX: ${PLATFORM_SECURITY_SESSION_KEY_PREFIX:-ai-club:login:token:}
      PLATFORM_YAADE_BASE_URL: ${PLATFORM_YAADE_BASE_URL:-http://host.docker.internal:9339/api/yaade/proxy}
      PLATFORM_YAADE_ADMIN_USERNAME: ${PLATFORM_YAADE_ADMIN_USERNAME:-admin}
      PLATFORM_YAADE_ADMIN_PASSWORD: ${PLATFORM_YAADE_ADMIN_PASSWORD:-password}
      PLATFORM_YAADE_DEFAULT_USER_PASSWORD: ${PLATFORM_YAADE_DEFAULT_USER_PASSWORD:-password}
      PLATFORM_YAADE_PUBLIC_COLLECTION_NAME: ${PLATFORM_YAADE_PUBLIC_COLLECTION_NAME:-未关联项目}
      PLATFORM_YAADE_PROXY_SESSION_TTL_MINUTES: ${PLATFORM_YAADE_PROXY_SESSION_TTL_MINUTES:-120}
      PLATFORM_MINIO_ENDPOINT: http://minio:9000
      PLATFORM_MINIO_ACCESS_KEY: ${PLATFORM_MINIO_ACCESS_KEY:-minioadmin}
      PLATFORM_MINIO_SECRET_KEY: ${PLATFORM_MINIO_SECRET_KEY:-minioadmin}
      PLATFORM_MINIO_BUCKET: ${PLATFORM_MINIO_BUCKET:-ai-club-assets}
      PLATFORM_GITEE_BINDING_ENTERPRISE_ID: ${PLATFORM_GITEE_BINDING_ENTERPRISE_ID:-}
      PLATFORM_GITEE_BINDING_ACCESS_TOKEN: ${PLATFORM_GITEE_BINDING_ACCESS_TOKEN:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    image: ${FRONTEND_IMAGE:-git-ai-club-frontend:latest}
    container_name: git-ai-club-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:80"
