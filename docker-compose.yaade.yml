services:
  yaade:
    build:
      context: .
      dockerfile: docker/yaade/Dockerfile
      args:
        YAADE_REF: ${YAADE_REF:-main}
    image: ${YAADE_IMAGE:-git-ai-club-yaade:latest}
    container_name: ai-club-yaade
    restart: unless-stopped
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      YAADE_ADMIN_USERNAME: ${YAADE_ADMIN_USERNAME:-admin}
      YAADE_DEFAULT_PASSWORD: ${YAADE_DEFAULT_PASSWORD:-password}
      YAADE_BASE_PATH: ${YAADE_BASE_PATH:-/api/yaade/proxy}
    ports:
      - "${YAADE_PORT:-9339}:9339"
    volumes:
      - "${YAADE_DATA_DIR:-./.data/yaade}:/app/data"
