# 服务器部署编排文件：面向 192.168.110.23 的一键构建与启动配置。
services:
  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    container_name: git-ai-club-server-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_platform}
      POSTGRES_USER: ${POSTGRES_USER:-aiclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiclub123}
      # 将 Hindsight 独立数据库名传入 PostgreSQL 初始化脚本，避免回退到默认值。
      HINDSIGHT_POSTGRES_DB: ${HINDSIGHT_POSTGRES_DB:-hindsight}
      TZ: ${APP_TZ:-Asia/Shanghai}
      PGTZ: ${APP_TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - "${POSTGRES_DATA_DIR:-/data/git-ai-club/postgres}:/var/lib/postgresql/data"
      # 初始化 Hindsight 专用数据库与 pgvector 扩展；仅在 PGDATA 首次初始化时执行。
      - "./docker/postgres/init:/docker-entrypoint-initdb.d:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiclub} -d ${POSTGRES_DB:-ai_agent_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-bootstrap:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    container_name: git-ai-club-server-postgres-bootstrap
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_platform}
      POSTGRES_USER: ${POSTGRES_USER:-aiclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiclub123}
      HINDSIGHT_POSTGRES_DB: ${HINDSIGHT_POSTGRES_DB:-hindsight}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    volumes:
      - "./docker/postgres/init:/docker-entrypoint-initdb.d:ro"
    # 每次启动时都补偿一次独立库和 vector 扩展，兼容已有 PGDATA 不会重跑 initdb 脚本的场景。
    entrypoint:
      - /bin/sh
      - /docker-entrypoint-initdb.d/10-init-hindsight-db.sh

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: git-ai-club-server-redis
    restart: unless-stopped
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\";
      else
        redis-server --appendonly yes;
      fi"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - "${REDIS_DATA_DIR:-/data/git-ai-club/redis}:/data"
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-02-28T09-55-16Z}
    container_name: git-ai-club-server-minio
    restart: unless-stopped
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      MINIO_ROOT_USER: ${PLATFORM_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${PLATFORM_MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - "${MINIO_DATA_DIR:-/data/git-ai-club/minio}:/data"

  hindsight:
    image: ${HINDSIGHT_IMAGE:-ghcr.io/vectorize-io/hindsight:latest}
    container_name: git-ai-club-server-hindsight
    restart: unless-stopped
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      HINDSIGHT_API_LLM_PROVIDER: ${HINDSIGHT_API_LLM_PROVIDER:-openai}
      HINDSIGHT_API_LLM_BASE_URL: ${HINDSIGHT_API_LLM_BASE_URL:-https://api.openai.com/v1}
      HINDSIGHT_API_LLM_API_KEY: ${HINDSIGHT_API_LLM_API_KEY:-}
      HINDSIGHT_API_LLM_MODEL: ${HINDSIGHT_API_LLM_MODEL:-gpt-4o-mini}
      HINDSIGHT_API_EMBEDDINGS_PROVIDER: ${HINDSIGHT_API_EMBEDDINGS_PROVIDER:-local}
      # Hindsight 固定连接独立数据库，避免与业务库 ai_agent_platform 混用。
      HINDSIGHT_API_DATABASE_URL: postgresql://${POSTGRES_USER:-aiclub}:${POSTGRES_PASSWORD:-aiclub123}@postgres:5432/${HINDSIGHT_POSTGRES_DB:-hindsight}
      HINDSIGHT_API_VECTOR_EXTENSION: ${HINDSIGHT_API_VECTOR_EXTENSION:-pgvector}
      # 在 bridge 网络内固定监听容器端口，避免服务只绑定到容器回环地址导致 Hermes 无法访问。
      HINDSIGHT_API_HOST: 0.0.0.0
      HINDSIGHT_API_PORT: 8888
      HINDSIGHT_DASHBOARD_HOST: 0.0.0.0
      HINDSIGHT_DASHBOARD_PORT: 9999
      HF_ENDPOINT: https://hf-mirror.com
    ports:
      - "${HINDSIGHT_PORT:-18888}:8888"
      - "${HINDSIGHT_CONSOLE_PORT:-19999}:9999"

  hermes:
    build:
      context: ./docker/hermes
      dockerfile: Dockerfile
    image: ${HERMES_IMAGE:-git-ai-club-hermes:latest}
    container_name: git-ai-club-server-hermes
    restart: unless-stopped
    depends_on:
      hindsight:
        condition: service_started
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      HERMES_HOME: /opt/data
      HERMES_LLM_PROVIDER: ${HERMES_LLM_PROVIDER:-}
      HERMES_LLM_MODEL: ${HERMES_LLM_MODEL:-MiniMax-M2.7}
      HERMES_LLM_API_KEY: ${HERMES_LLM_API_KEY:-}
      HERMES_LLM_BASE_URL: ${HERMES_LLM_BASE_URL:-}
      HERMES_MEMORY_PROVIDER: hindsight
      HERMES_MEMORY_HINDSIGHT_URL: http://hindsight:8888
      HINDSIGHT_API_URL: http://hindsight:8888
      HINDSIGHT_API_KEY: local
      HINDSIGHT_LLM_API_KEY: ${HERMES_LLM_API_KEY:-}
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 18080
      API_SERVER_KEY: ${PLATFORM_HERMES_API_KEY:-}
      API_SERVER_MODEL_NAME: ${PLATFORM_HERMES_MODEL:-hermes-agent}
      HONCHO_BASE_URL: ${HONCHO_BASE_URL:-http://hindsight:8888}
      PLATFORM_HERMES_MCP_SHARED_TOKEN: ${PLATFORM_HERMES_MCP_SHARED_TOKEN:-git-ai-club-hermes-mcp-token}
    entrypoint:
      - /bin/sh
      - -lc
      - |
        mkdir -p /opt/data
        # 兼容第三方 OpenAI 兼容网关：只要配置了 base_url，就自动切换成 custom provider。
        MODEL_PROVIDER="$${HERMES_LLM_PROVIDER:-}"
        if [ -z "$$MODEL_PROVIDER" ]; then
          if [ -n "$${HERMES_LLM_BASE_URL:-}" ]; then
            MODEL_PROVIDER="custom"
          else
            MODEL_PROVIDER="minimax-cn"
          fi
        fi
        {
          echo "model:"
          echo "  provider: $$MODEL_PROVIDER"
          echo "  default: $${HERMES_LLM_MODEL:-MiniMax-M2.7}"
          if [ -n "$${HERMES_LLM_BASE_URL:-}" ]; then
            echo "  base_url: $${HERMES_LLM_BASE_URL}"
          fi
          if [ -n "$${HERMES_LLM_API_KEY:-}" ]; then
            echo "  api_key: $${HERMES_LLM_API_KEY}"
          fi
          echo "memory:"
          echo "  provider: $${HERMES_MEMORY_PROVIDER:-hindsight}"
          if [ -n "$${HERMES_MEMORY_HINDSIGHT_URL:-}" ]; then
            echo "  hindsight_url: $${HERMES_MEMORY_HINDSIGHT_URL}"
          fi
          echo "platform_toolsets:"
          echo "  api_server:"
          echo "    - git_ai_club"
          echo "mcp_servers:"
          echo "  git_ai_club:"
          echo "    url: http://code-processing:9000/mcp/"
          echo "    headers:"
          echo "      Authorization: Bearer ${PLATFORM_HERMES_MCP_SHARED_TOKEN:-git-ai-club-hermes-mcp-token}"
          echo "    enabled: true"
          echo "    tools:"
          echo "      resources: false"
          echo "      prompts: false"
        } > /opt/data/config.yaml
        # 等待 Hindsight API 真正就绪，避免 Hermes 启动后首次记忆同步时因冷启动而连接失败。
        python - <<'PY'
        import os
        import sys
        import time
        import urllib.error
        import urllib.request
        
        base_url = os.getenv("HERMES_MEMORY_HINDSIGHT_URL", "http://hindsight:8888").rstrip("/")
        deadline = time.time() + 120
        last_error = "未知错误"
        
        while time.time() < deadline:
            try:
                with urllib.request.urlopen(f"{base_url}/health", timeout=3) as response:
                    if 200 <= response.status < 500:
                        print(f"Hindsight 已就绪: {base_url}/health")
                        sys.exit(0)
            except urllib.error.HTTPError as exc:
                if exc.code < 500:
                    print(f"Hindsight 已响应（状态码 {exc.code}），继续启动 Hermes。")
                    sys.exit(0)
                last_error = f"HTTP {exc.code}"
            except Exception as exc:
                last_error = str(exc)
            time.sleep(2)
        
        print(f"Hindsight 在 120 秒内仍未就绪，最后一次错误：{last_error}", file=sys.stderr)
        sys.exit(1)
        PY
        exec hermes gateway
    command: []
    ports:
      - "${HERMES_PORT:-18080}:18080"
    volumes:
      - "${HERMES_DATA_DIR:-/data/git-ai-club/hermes}:/opt/data"

  code-processing:
    build:
      context: ./code-processing
      dockerfile: Dockerfile
    image: ${CODE_PROCESSING_IMAGE:-git-ai-club-code-processing:latest}
    container_name: git-ai-club-server-code-processing
    restart: unless-stopped
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      PLATFORM_BACKEND_INTERNAL_BASE_URL: ${PLATFORM_BACKEND_INTERNAL_BASE_URL:-http://backend:8080}
      PLATFORM_INTERNAL_SERVICE_TOKEN: ${PLATFORM_INTERNAL_SERVICE_TOKEN:-git-ai-club-internal-service-token}
      PLATFORM_HERMES_MCP_SHARED_TOKEN: ${PLATFORM_HERMES_MCP_SHARED_TOKEN:-git-ai-club-hermes-mcp-token}
      PLATFORM_MINIO_ENDPOINT: ${PLATFORM_MINIO_ENDPOINT:-http://minio:9000}
      PLATFORM_MINIO_ACCESS_KEY: ${PLATFORM_MINIO_ACCESS_KEY:-minioadmin}
      PLATFORM_MINIO_SECRET_KEY: ${PLATFORM_MINIO_SECRET_KEY:-minioadmin}
      PLATFORM_MINIO_BUCKET: ${PLATFORM_MINIO_BUCKET:-ai-club-assets}
      PLATFORM_SCAN_WORKSPACE_ROOT: ${PLATFORM_SCAN_WORKSPACE_ROOT:-/tmp/git-ai-club-scans}
    ports:
      - "${CODE_PROCESSING_PORT:-9000}:9000"
    volumes:
      - ${PLATFORM_SCAN_HOST_PATH:-/data/git-ai-club/scans}:${PLATFORM_SCAN_WORKSPACE_ROOT:-/scan-workspace}

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-git-ai-club-backend:latest}
    container_name: git-ai-club-server-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      code-processing:
        condition: service_started
      hermes:
        condition: service_started
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ai_agent_platform}
      DB_USERNAME: ${POSTGRES_USER:-aiclub}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-aiclub123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      PLATFORM_CODE_PROCESSING_BASE_URL: http://code-processing:9000
      PLATFORM_HERMES_BASE_URL: http://hermes:18080/v1
      PLATFORM_HERMES_API_KEY: ${PLATFORM_HERMES_API_KEY:-}
      PLATFORM_HERMES_MODEL: ${PLATFORM_HERMES_MODEL:-hermes-agent}
      PLATFORM_HERMES_TIMEOUT_SECONDS: ${PLATFORM_HERMES_TIMEOUT_SECONDS:-180}
      PLATFORM_HERMES_SESSION_PREFIX: ${PLATFORM_HERMES_SESSION_PREFIX:-ai-club:hermes}
      PLATFORM_HERMES_MAX_CONTEXT_MESSAGES: ${PLATFORM_HERMES_MAX_CONTEXT_MESSAGES:-6}
      PLATFORM_HERMES_GROUNDING_TTL_SECONDS: ${PLATFORM_HERMES_GROUNDING_TTL_SECONDS:-86400}
      PLATFORM_INTERNAL_SERVICE_TOKEN: ${PLATFORM_INTERNAL_SERVICE_TOKEN:-git-ai-club-internal-service-token}
      PLATFORM_GITLAB_DEFAULT_API_URL: ${PLATFORM_GITLAB_DEFAULT_API_URL:-http://192.168.110.138:30080/api/v4}
      PLATFORM_GITLAB_OAUTH_CLIENT_ID: ${PLATFORM_GITLAB_OAUTH_CLIENT_ID:-}
      PLATFORM_GITLAB_OAUTH_CLIENT_SECRET: ${PLATFORM_GITLAB_OAUTH_CLIENT_SECRET:-}
      PLATFORM_GITLAB_OAUTH_REDIRECT_URI: ${PLATFORM_GITLAB_OAUTH_REDIRECT_URI:-http://localhost:5173/profile/gitlab-callback}
      PLATFORM_TOKEN_SECRET: ${PLATFORM_TOKEN_SECRET:-ai-club-demo-token-secret}
      PLATFORM_TOKEN_EXPIRE_HOURS: ${PLATFORM_TOKEN_EXPIRE_HOURS:-12}
      PLATFORM_SECURITY_SESSION_KEY_PREFIX: ${PLATFORM_SECURITY_SESSION_KEY_PREFIX:-ai-club:login:token:}
      PLATFORM_MINIO_ENDPOINT: http://minio:9000
      PLATFORM_MINIO_ACCESS_KEY: ${PLATFORM_MINIO_ACCESS_KEY:-minioadmin}
      PLATFORM_MINIO_SECRET_KEY: ${PLATFORM_MINIO_SECRET_KEY:-minioadmin}
      PLATFORM_MINIO_BUCKET: ${PLATFORM_MINIO_BUCKET:-ai-club-assets}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 前端默认按“当前主机名 + 后端端口”直连真实后端，也支持显式传完整接口地址。
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-}"
        VITE_API_PORT: "${VITE_API_PORT:-8080}"
    image: ${FRONTEND_IMAGE:-git-ai-club-frontend:latest}
    container_name: git-ai-club-server-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:80"
