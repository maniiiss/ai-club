# 服务器部署编排文件：面向 192.168.110.23 的一键构建与启动配置。
services:
  postgres:
    image: ${POSTGRES_IMAGE:-timescale/timescaledb-ha:pg16}
    container_name: git-ai-club-server-postgres
    user: "0:0"
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_platform}
      POSTGRES_USER: ${POSTGRES_USER:-aiclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiclub123}
      HINDSIGHT_POSTGRES_DB: ${HINDSIGHT_POSTGRES_DB:-hindsight}
      HINDSIGHT_API_VECTOR_EXTENSION: ${HINDSIGHT_API_VECTOR_EXTENSION:-pgvectorscale}
      TZ: ${APP_TZ:-Asia/Shanghai}
      PGTZ: ${APP_TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - "${POSTGRES_DATA_DIR:-/data/git-ai-club/postgres}:/home/postgres/pgdata"
      # 初始化 Hindsight 专用数据库与 pgvector 扩展；仅在 PGDATA 首次初始化时执行。
      - "./docker/postgres/init:/docker-entrypoint-initdb.d:ro"
      - "./docker/postgres/bin:/opt/git-ai-club/postgres/bin:ro"
    entrypoint:
      - /bin/sh
      - /opt/git-ai-club/postgres/bin/start-postgres-with-auto-pgdata.sh
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-aiclub} -d ${POSTGRES_DB:-ai_agent_platform}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-bootstrap:
    image: ${POSTGRES_IMAGE:-timescale/timescaledb-ha:pg16}
    container_name: git-ai-club-server-postgres-bootstrap
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_platform}
      POSTGRES_USER: ${POSTGRES_USER:-aiclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiclub123}
      HINDSIGHT_POSTGRES_DB: ${HINDSIGHT_POSTGRES_DB:-hindsight}
      HINDSIGHT_API_VECTOR_EXTENSION: ${HINDSIGHT_API_VECTOR_EXTENSION:-pgvectorscale}
      # PostgreSQL 初始化补偿目标由 env 决定；服务器外部库场景不能固定走 Docker 内部服务名。
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      # Hindsight 数据库密码单独通过 libpq 环境变量传递，避免复杂密码写入 URL 后被解析链路误伤。
      PGPASSWORD: ${HINDSIGHT_API_DATABASE_PASSWORD:-${POSTGRES_PASSWORD:-aiclub123}}
    volumes:
      - "./docker/postgres/init:/docker-entrypoint-initdb.d:ro"
    # 每次启动时都补偿一次独立库和 vector 扩展，兼容已有 PGDATA 不会重跑 initdb 脚本的场景。
    entrypoint:
      - /bin/sh
      - /docker-entrypoint-initdb.d/10-init-hindsight-db.sh

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: git-ai-club-server-redis
    restart: unless-stopped
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\";
      else
        redis-server --appendonly yes;
      fi"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - "${REDIS_DATA_DIR:-/data/git-ai-club/redis}:/data"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping; else redis-cli ping; fi',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-02-28T09-55-16Z}
    container_name: git-ai-club-server-minio
    restart: unless-stopped
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      MINIO_ROOT_USER: ${PLATFORM_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${PLATFORM_MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - "${MINIO_DATA_DIR:-/data/git-ai-club/minio}:/data"

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.13.4}
    container_name: git-ai-club-server-qdrant
    restart: unless-stopped
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      QDRANT__SERVICE__HTTP_PORT: 6333
    ports:
      - "${QDRANT_PORT:-16333}:6333"
    volumes:
      - "${QDRANT_DATA_DIR:-/data/git-ai-club/qdrant}:/qdrant/storage"

  hindsight:
    image: ${HINDSIGHT_IMAGE:-ghcr.io/vectorize-io/hindsight:latest}
    container_name: git-ai-club-server-hindsight
    restart: unless-stopped
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      HINDSIGHT_API_LLM_PROVIDER: ${HINDSIGHT_API_LLM_PROVIDER:-openai}
      HINDSIGHT_API_LLM_BASE_URL: ${HINDSIGHT_API_LLM_BASE_URL:-https://api.openai.com/v1}
      HINDSIGHT_API_LLM_API_KEY: ${HINDSIGHT_API_LLM_API_KEY:-}
      HINDSIGHT_API_LLM_MODEL: ${HINDSIGHT_API_LLM_MODEL:-gpt-4o-mini}
      # 外部 LLM 临时限流或欠费时，也要先把 Hindsight 拉起来，保障 recall / 实体图等只读链路可用。
      # 真正需要 LLM 的 retain / reflect / consolidation 请求会在单次调用时再明确报错。
      HINDSIGHT_API_SKIP_LLM_VERIFICATION: ${HINDSIGHT_API_SKIP_LLM_VERIFICATION:-true}
      HINDSIGHT_API_EMBEDDINGS_PROVIDER: ${HINDSIGHT_API_EMBEDDINGS_PROVIDER:-openai}
      HINDSIGHT_API_EMBEDDINGS_LOCAL_MODEL: ${HINDSIGHT_API_EMBEDDINGS_LOCAL_MODEL:-BAAI/bge-small-en-v1.5}
      HINDSIGHT_API_EMBEDDINGS_OPENAI_BASE_URL: ${HINDSIGHT_API_EMBEDDINGS_OPENAI_BASE_URL:-http://127.0.0.1:8000/v1}
      HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY: ${HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY:-local}
      HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL: ${HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL:-Qwen/Qwen3-Embedding-4B}
      HINDSIGHT_API_RERANKER_PROVIDER: ${HINDSIGHT_API_RERANKER_PROVIDER:-rrf}
      HINDSIGHT_API_RERANKER_LOCAL_MODEL: ${HINDSIGHT_API_RERANKER_LOCAL_MODEL:-BAAI/bge-reranker-v2-m3}
      HINDSIGHT_API_RERANKER_LITELLM_API_BASE: ${HINDSIGHT_API_RERANKER_LITELLM_API_BASE:-http://127.0.0.1:4000}
      HINDSIGHT_API_RERANKER_LITELLM_API_KEY: ${HINDSIGHT_API_RERANKER_LITELLM_API_KEY:-}
      HINDSIGHT_API_RERANKER_LITELLM_MODEL: ${HINDSIGHT_API_RERANKER_LITELLM_MODEL:-cohere/rerank-english-v3.0}
      # Hindsight 默认复用 env 中的 PostgreSQL 地址，避免与 bootstrap 补偿目标不一致。
      # 为了兼容包含 @、?、*、% 等特殊字符的复杂密码，默认不再把密码直接写进 URL，
      # 而是交给 libpq 从 PGPASSWORD 读取，避免 Alembic / SQLAlchemy URL 解析链路误伤。
      HINDSIGHT_API_DATABASE_URL: ${HINDSIGHT_API_DATABASE_URL:-postgresql://${POSTGRES_USER:-aiclub}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${HINDSIGHT_POSTGRES_DB:-hindsight}}
      # 如果 Hindsight 需要连接独立数据库账号，可单独覆盖 HINDSIGHT_API_DATABASE_PASSWORD；
      # 未显式设置时，默认复用 POSTGRES_PASSWORD。
      PGPASSWORD: ${HINDSIGHT_API_DATABASE_PASSWORD:-${POSTGRES_PASSWORD:-aiclub123}}
      HINDSIGHT_API_VECTOR_EXTENSION: ${HINDSIGHT_API_VECTOR_EXTENSION:-pgvectorscale}
      # 在 bridge 网络内固定监听容器端口，避免服务只绑定到容器回环地址导致 Hermes 无法访问。
      HINDSIGHT_API_HOST: 0.0.0.0
      HINDSIGHT_API_PORT: 8888
      HINDSIGHT_DASHBOARD_HOST: 0.0.0.0
      HINDSIGHT_DASHBOARD_PORT: 9999
      HF_ENDPOINT: https://hf-mirror.com
    ports:
      - "${HINDSIGHT_PORT:-18888}:8888"
      - "${HINDSIGHT_CONSOLE_PORT:-19999}:9999"

  hermes:
    build:
      context: ./docker/hermes
      dockerfile: Dockerfile
      args:
        # Hermes API Server 的思考输出行为会随上游镜像变化；这里允许部署端显式 pin 基础镜像版本或 digest。
        HERMES_BASE_IMAGE: ${HERMES_BASE_IMAGE:-nousresearch/hermes-agent:latest}
    image: ${HERMES_IMAGE:-git-ai-club-hermes:latest}
    container_name: git-ai-club-server-hermes
    restart: unless-stopped
    depends_on:
      hindsight:
        condition: service_started
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      HERMES_HOME: /opt/data
      HERMES_LLM_PROVIDER: ${HERMES_LLM_PROVIDER:-}
      HERMES_LLM_MODEL: ${HERMES_LLM_MODEL:-MiniMax-M2.7}
      HERMES_LLM_API_KEY: ${HERMES_LLM_API_KEY:-}
      HERMES_LLM_BASE_URL: ${HERMES_LLM_BASE_URL:-}
      # 默认关闭 Hermes 自带的外部 Hindsight memory provider，避免与平台后端的用户会话记忆重复写入。
      HERMES_MEMORY_PROVIDER: ${HERMES_MEMORY_PROVIDER:-}
      # 容器内调用 Hindsight 必须走服务名，不能复用面向浏览器的 SERVER_HOST。
      HERMES_MEMORY_HINDSIGHT_URL: http://hindsight:8888
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 18080
      API_SERVER_KEY: ${PLATFORM_HERMES_API_KEY:-}
      API_SERVER_MODEL_NAME: ${PLATFORM_HERMES_MODEL:-hermes-agent}
      PLATFORM_HERMES_MCP_SHARED_TOKEN: ${PLATFORM_HERMES_MCP_SHARED_TOKEN:-git-ai-club-hermes-mcp-token}
    # 保留官方镜像 entrypoint，只通过 command 注入平台启动前置逻辑。
    command:
      - /bin/sh
      - -lc
      - |
        mkdir -p /opt/data
        # 兼容第三方 OpenAI 兼容网关：只要配置了 base_url，就自动切换成 custom provider。
        MODEL_PROVIDER="$${HERMES_LLM_PROVIDER:-}"
        MEMORY_PROVIDER="$${HERMES_MEMORY_PROVIDER:-}"
        if [ -z "$$MODEL_PROVIDER" ]; then
          if [ -n "$${HERMES_LLM_BASE_URL:-}" ]; then
            MODEL_PROVIDER="custom"
          else
            MODEL_PROVIDER="minimax-cn"
          fi
        fi
        {
          echo "model:"
          echo "  provider: $$MODEL_PROVIDER"
          echo "  default: $${HERMES_LLM_MODEL:-MiniMax-M2.7}"
          if [ -n "$${HERMES_LLM_BASE_URL:-}" ]; then
            echo "  base_url: $${HERMES_LLM_BASE_URL}"
          fi
          if [ -n "$${HERMES_LLM_API_KEY:-}" ]; then
            echo "  api_key: $${HERMES_LLM_API_KEY}"
          fi
          if [ -n "$$MEMORY_PROVIDER" ]; then
            echo "memory:"
            echo "  provider: $$MEMORY_PROVIDER"
            if [ "$$MEMORY_PROVIDER" = "hindsight" ] && [ -n "$${HERMES_MEMORY_HINDSIGHT_URL:-}" ]; then
              echo "  hindsight_url: $${HERMES_MEMORY_HINDSIGHT_URL}"
            fi
          fi
          # 对话式输出显式开启 reasoning 展示，配合本地 API Server patch 把思考过程透给下游客户端。
          echo "display:"
          echo "  show_reasoning: true"
          echo "platform_toolsets:"
          echo "  api_server:"
          echo "    - git_ai_club"
          echo "mcp_servers:"
          echo "  git_ai_club:"
          echo "    url: http://code-processing:9000/mcp/"
          echo "    headers:"
          echo "      Authorization: Bearer ${PLATFORM_HERMES_MCP_SHARED_TOKEN:-git-ai-club-hermes-mcp-token}"
          echo "    enabled: true"
          echo "    tools:"
          echo "      resources: false"
          echo "      prompts: false"
        } > /opt/data/config.yaml
        # 等待 Hindsight API 真正就绪，避免 Hermes 启动后首次记忆同步时因冷启动而连接失败。
        python3 - <<'PY'
        import os
        import sys
        import time
        import urllib.error
        import urllib.request

        base_url = os.getenv("HERMES_MEMORY_HINDSIGHT_URL", "http://hindsight:8888").rstrip("/")
        deadline = time.time() + 120
        last_error = "未知错误"

        while time.time() < deadline:
            try:
                with urllib.request.urlopen(f"{base_url}/health", timeout=3) as response:
                    if 200 <= response.status < 500:
                        print(f"Hindsight 已就绪: {base_url}/health")
                        sys.exit(0)
            except urllib.error.HTTPError as exc:
                if exc.code < 500:
                    print(f"Hindsight 已响应（状态码 {exc.code}），继续启动 Hermes。")
                    sys.exit(0)
                last_error = f"HTTP {exc.code}"
            except Exception as exc:
                last_error = str(exc)
            time.sleep(2)

        print(f"Hindsight 在 120 秒内仍未就绪，最后一次错误：{last_error}", file=sys.stderr)
        sys.exit(1)
        PY
        exec /opt/hermes/.venv/bin/hermes gateway run
    ports:
      - "${HERMES_PORT:-18080}:18080"
    volumes:
      - "${HERMES_DATA_DIR:-/data/git-ai-club/hermes}:/opt/data"

  code-processing:
    build:
      context: ./code-processing
      dockerfile: Dockerfile
    image: ${CODE_PROCESSING_IMAGE:-git-ai-club-code-processing:latest}
    container_name: git-ai-club-server-code-processing
    restart: unless-stopped
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      # 全量 Docker 内部工具桥接必须走 backend 容器端口 8080；BACKEND_PORT 只是宿主机映射端口。
      PLATFORM_BACKEND_INTERNAL_BASE_URL: http://backend:8080
      PLATFORM_INTERNAL_SERVICE_TOKEN: ${PLATFORM_INTERNAL_SERVICE_TOKEN:-git-ai-club-internal-service-token}
      PLATFORM_HERMES_MCP_SHARED_TOKEN: ${PLATFORM_HERMES_MCP_SHARED_TOKEN:-git-ai-club-hermes-mcp-token}
      PLATFORM_MINIO_ENDPOINT: ${PLATFORM_MINIO_ENDPOINT:-http://minio:9000}
      PLATFORM_MINIO_ACCESS_KEY: ${PLATFORM_MINIO_ACCESS_KEY:-minioadmin}
      PLATFORM_MINIO_SECRET_KEY: ${PLATFORM_MINIO_SECRET_KEY:-minioadmin}
      PLATFORM_MINIO_BUCKET: ${PLATFORM_MINIO_BUCKET:-ai-club-assets}
      PLATFORM_SCAN_WORKSPACE_ROOT: ${PLATFORM_SCAN_WORKSPACE_ROOT:-/tmp/git-ai-club-scans}
      # 透传 Codex / Claude Code CLI 配置，确保执行中心读取到与 .env.server 一致的值。
      PLATFORM_CODEX_CLI_PATH: ${PLATFORM_CODEX_CLI_PATH:-}
      PLATFORM_CODEX_MODEL_PROVIDER: ${PLATFORM_CODEX_MODEL_PROVIDER:-}
      PLATFORM_CODEX_REASONING_EFFORT: ${PLATFORM_CODEX_REASONING_EFFORT:-low}
      PLATFORM_CLAUDE_CLI_PATH: ${PLATFORM_CLAUDE_CLI_PATH:-}
      PLATFORM_CLAUDE_MODEL: ${PLATFORM_CLAUDE_MODEL:-}
    ports:
      - "${CODE_PROCESSING_PORT:-9000}:9000"
    volumes:
      - ${PLATFORM_SCAN_HOST_PATH:-/data/git-ai-club/scans}:${PLATFORM_SCAN_WORKSPACE_ROOT:-/scan-workspace}

  gitnexus-web:
    build:
      context: ./docker/gitnexus-web
      args:
        GITNEXUS_WEB_BASE_IMAGE: ${GITNEXUS_WEB_BASE_IMAGE:-ghcr.io/abhigyanpatwari/gitnexus-web:latest}
    image: ${GITNEXUS_WEB_IMAGE:-git-ai-club-gitnexus-web:latest}
    container_name: git-ai-club-server-gitnexus-web
    restart: unless-stopped
    environment:
      # GitNexus Nexus AI 是浏览器侧能力，默认从 Hermes LLM 配置生成前端可读取的 AI 设置。
      GITNEXUS_AI_AUTO_CONFIG_ENABLED: ${GITNEXUS_AI_AUTO_CONFIG_ENABLED:-true}
      GITNEXUS_AI_PROXY_ENABLED: ${GITNEXUS_AI_PROXY_ENABLED:-true}
      GITNEXUS_AI_FALLBACK_TO_HERMES: ${GITNEXUS_AI_FALLBACK_TO_HERMES:-true}
      GITNEXUS_AI_FORCE_CHINESE: ${GITNEXUS_AI_FORCE_CHINESE:-true}
      GITNEXUS_AI_SYSTEM_PROMPT: ${GITNEXUS_AI_SYSTEM_PROMPT:-}
      GITNEXUS_AI_FORCE_CONFIG: ${GITNEXUS_AI_FORCE_CONFIG:-false}
      GITNEXUS_AI_PROVIDER: ${GITNEXUS_AI_PROVIDER:-}
      GITNEXUS_AI_BASE_URL: ${GITNEXUS_AI_BASE_URL:-}
      GITNEXUS_AI_API_KEY: ${GITNEXUS_AI_API_KEY:-}
      GITNEXUS_AI_MODEL: ${GITNEXUS_AI_MODEL:-}
      GITNEXUS_AI_TEMPERATURE: ${GITNEXUS_AI_TEMPERATURE:-0.1}
      GITNEXUS_AI_MAX_TOKENS: ${GITNEXUS_AI_MAX_TOKENS:-}
      GITNEXUS_AI_AZURE_ENDPOINT: ${GITNEXUS_AI_AZURE_ENDPOINT:-}
      GITNEXUS_AI_AZURE_DEPLOYMENT: ${GITNEXUS_AI_AZURE_DEPLOYMENT:-}
      GITNEXUS_AI_AZURE_API_VERSION: ${GITNEXUS_AI_AZURE_API_VERSION:-}
      HERMES_LLM_PROVIDER: ${HERMES_LLM_PROVIDER:-}
      HERMES_LLM_BASE_URL: ${HERMES_LLM_BASE_URL:-}
      HERMES_LLM_API_KEY: ${HERMES_LLM_API_KEY:-}
      HERMES_LLM_MODEL: ${HERMES_LLM_MODEL:-}
    # 只托管 GitNexus Web UI；4747 的 gitnexus serve 仍由 code-processing 在 launch 时按需启动。
    ports:
      - "${PLATFORM_GITNEXUS_UI_PUBLIC_PORT:-5174}:4173"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4173/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  woodpecker-server:
    profiles:
      - woodpecker
    image: ${WOODPECKER_IMAGE:-woodpeckerci/woodpecker-server:v3}
    container_name: git-ai-club-server-woodpecker-server
    restart: unless-stopped
    env_file:
      - path: ${WOODPECKER_FORGE_ENV_FILE:-/data/git-ai-club/woodpecker/forge.env}
        required: false
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      WOODPECKER_LOG_LEVEL: ${WOODPECKER_LOG_LEVEL:-info}
      WOODPECKER_HOST: ${WOODPECKER_HOST:-http://localhost:18000}
      WOODPECKER_AGENT_SECRET: ${WOODPECKER_AGENT_SECRET:-change-me-woodpecker-agent-secret}
    ports:
      - "${WOODPECKER_PORT:-18000}:8000"
    volumes:
      - "${WOODPECKER_DATA_DIR:-/data/git-ai-club/woodpecker}:/var/lib/woodpecker/"

  woodpecker-agent:
    profiles:
      - woodpecker
    image: ${WOODPECKER_AGENT_IMAGE:-woodpeckerci/woodpecker-agent:v3}
    container_name: git-ai-club-server-woodpecker-agent
    restart: unless-stopped
    command: agent
    depends_on:
      woodpecker-server:
        condition: service_started
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      WOODPECKER_SERVER: woodpecker-server:9000
      WOODPECKER_AGENT_SECRET: ${WOODPECKER_AGENT_SECRET:-change-me-woodpecker-agent-secret}
    volumes:
      - "${WOODPECKER_AGENT_DATA_DIR:-/data/git-ai-club/woodpecker-agent}:/etc/woodpecker"
      - /var/run/docker.sock:/var/run/docker.sock

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-git-ai-club-backend:latest}
    container_name: git-ai-club-server-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      code-processing:
        condition: service_started
      hermes:
        condition: service_started
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ai_agent_platform}
      DB_USERNAME: ${POSTGRES_USER:-aiclub}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-aiclub123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # backend 调用 code-processing 走容器内服务名，避免被 MCP Host 校验或宿主机防火墙拦截。
      PLATFORM_CODE_PROCESSING_BASE_URL: http://code-processing:9000
      PLATFORM_HERMES_BASE_URL: http://hermes:18080/v1
      PLATFORM_HERMES_API_KEY: ${PLATFORM_HERMES_API_KEY:-}
      PLATFORM_HERMES_MODEL: ${PLATFORM_HERMES_MODEL:-hermes-agent}
      PLATFORM_HERMES_TIMEOUT_SECONDS: ${PLATFORM_HERMES_TIMEOUT_SECONDS:-180}
      PLATFORM_HERMES_SESSION_PREFIX: ${PLATFORM_HERMES_SESSION_PREFIX:-ai-club:hermes}
      PLATFORM_HERMES_MAX_CONTEXT_MESSAGES: ${PLATFORM_HERMES_MAX_CONTEXT_MESSAGES:-6}
      PLATFORM_HERMES_GROUNDING_TTL_SECONDS: ${PLATFORM_HERMES_GROUNDING_TTL_SECONDS:-86400}
      # backend 访问 Hindsight HTTP 接口与库内回退时，都固定走 docker bridge 内地址。
      HINDSIGHT_API_URL: http://hindsight:8888
      HINDSIGHT_API_KEY: ${HINDSIGHT_API_KEY:-}
      PLATFORM_HINDSIGHT_TIMEOUT_SECONDS: ${PLATFORM_HINDSIGHT_TIMEOUT_SECONDS:-30}
