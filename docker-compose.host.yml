# Host 网络部署编排文件。
# 适用于 Docker bridge 端口转发在当前服务器上不稳定的场景，直接复用宿主机网络栈。
services:
  postgres:
    image: ${POSTGRES_IMAGE:-timescale/timescaledb-ha:pg16}
    container_name: git-ai-club-host-postgres
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_platform}
      POSTGRES_USER: ${POSTGRES_USER:-aiclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiclub123}
      # 单一 PostgreSQL 服务同时承载业务库 ai_agent_platform 与 Hindsight 库 hindsight。
      PGDATA: /home/postgres/pgdata/data
      HINDSIGHT_POSTGRES_DB: ${HINDSIGHT_POSTGRES_DB:-hindsight}
      HINDSIGHT_API_VECTOR_EXTENSION: ${HINDSIGHT_API_VECTOR_EXTENSION:-pgvector}
      TZ: ${APP_TZ:-Asia/Shanghai}
      PGTZ: ${APP_TZ:-Asia/Shanghai}
    volumes:
      - "${POSTGRES_DATA_DIR:-/data/git-ai-club/postgres}:/home/postgres/pgdata"
      # 初始化 Hindsight 专用数据库与 pgvector 扩展；仅在 PGDATA 首次初始化时执行。
      - "./docker/postgres/init:/docker-entrypoint-initdb.d:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiclub} -d ${POSTGRES_DB:-ai_agent_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-bootstrap:
    image: ${POSTGRES_IMAGE:-timescale/timescaledb-ha:pg16}
    container_name: git-ai-club-host-postgres-bootstrap
    restart: "no"
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_platform}
      POSTGRES_USER: ${POSTGRES_USER:-aiclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiclub123}
      HINDSIGHT_POSTGRES_DB: ${HINDSIGHT_POSTGRES_DB:-hindsight}
      HINDSIGHT_API_VECTOR_EXTENSION: ${HINDSIGHT_API_VECTOR_EXTENSION:-pgvector}
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    volumes:
      - "./docker/postgres/init:/docker-entrypoint-initdb.d:ro"
    # Host 网络模式下也补偿一次独立库和 vector 扩展，避免旧数据目录漏初始化。
    entrypoint:
      - /bin/sh
      - /docker-entrypoint-initdb.d/10-init-hindsight-db.sh

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: git-ai-club-host-redis
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --appendonly yes --port ${REDIS_PORT:-6379} --requirepass \"$$REDIS_PASSWORD\";
      else
        redis-server --appendonly yes --port ${REDIS_PORT:-6379};
      fi"
    volumes:
      - "${REDIS_DATA_DIR:-/data/git-ai-club/redis}:/data"
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -p ${REDIS_PORT:-6379} -a \"$$REDIS_PASSWORD\" ping; else redis-cli -p ${REDIS_PORT:-6379} ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-02-28T09-55-16Z}
    container_name: git-ai-club-host-minio
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      MINIO_ROOT_USER: ${PLATFORM_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${PLATFORM_MINIO_SECRET_KEY:-minioadmin}
    command: server /data --address ":${MINIO_PORT:-19000}" --console-address ":${MINIO_CONSOLE_PORT:-19001}"
    volumes:
      - "${MINIO_DATA_DIR:-/data/git-ai-club/minio}:/data"

  hindsight:
    image: ${HINDSIGHT_IMAGE:-ghcr.io/vectorize-io/hindsight:latest}
    container_name: git-ai-club-host-hindsight
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      HINDSIGHT_API_LLM_PROVIDER: ${HINDSIGHT_API_LLM_PROVIDER:-openai}
      HINDSIGHT_API_LLM_BASE_URL: ${HINDSIGHT_API_LLM_BASE_URL:-https://api.openai.com/v1}
      HINDSIGHT_API_LLM_API_KEY: ${HINDSIGHT_API_LLM_API_KEY:-}
      HINDSIGHT_API_LLM_MODEL: ${HINDSIGHT_API_LLM_MODEL:-gpt-4o-mini}
      HINDSIGHT_API_EMBEDDINGS_PROVIDER: ${HINDSIGHT_API_EMBEDDINGS_PROVIDER:-openai}
      HINDSIGHT_API_EMBEDDINGS_LOCAL_MODEL: ${HINDSIGHT_API_EMBEDDINGS_LOCAL_MODEL:-BAAI/bge-small-en-v1.5}
      HINDSIGHT_API_EMBEDDINGS_OPENAI_BASE_URL: ${HINDSIGHT_API_EMBEDDINGS_OPENAI_BASE_URL:-http://127.0.0.1:8000/v1}
      HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY: ${HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY:-local}
      HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL: ${HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL:-Qwen/Qwen3-Embedding-4B}
      HINDSIGHT_API_RERANKER_PROVIDER: ${HINDSIGHT_API_RERANKER_PROVIDER:-rrf}
      HINDSIGHT_API_RERANKER_LOCAL_MODEL: ${HINDSIGHT_API_RERANKER_LOCAL_MODEL:-BAAI/bge-reranker-v2-m3}
      # Hindsight 固定连接独立数据库，避免与业务库 ai_agent_platform 混用。
      HINDSIGHT_API_DATABASE_URL: postgresql://${POSTGRES_USER:-aiclub}:${POSTGRES_PASSWORD:-aiclub123}@127.0.0.1:${POSTGRES_PORT:-5432}/${HINDSIGHT_POSTGRES_DB:-hindsight}
      HINDSIGHT_API_VECTOR_EXTENSION: ${HINDSIGHT_API_VECTOR_EXTENSION:-pgvector}
      HINDSIGHT_API_HOST: 0.0.0.0
      HINDSIGHT_API_PORT: ${HINDSIGHT_PORT:-18888}
      HINDSIGHT_DASHBOARD_HOST: 0.0.0.0
      HINDSIGHT_DASHBOARD_PORT: ${HINDSIGHT_CONSOLE_PORT:-19999}
      HF_ENDPOINT: https://hf-mirror.com

  hermes:
    build:
      context: ./docker/hermes
      dockerfile: Dockerfile
    image: ${HERMES_IMAGE:-git-ai-club-hermes:latest}
    container_name: git-ai-club-host-hermes
    restart: unless-stopped
    network_mode: host
    depends_on:
      hindsight:
        condition: service_started
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      HERMES_HOME: /opt/data
      LLM_MODEL: ${HERMES_LLM_MODEL:-gpt-4.1-mini}
      MINIMAX_CN_API_KEY: ${HERMES_LLM_API_KEY:-}
      MINIMAX_CN_BASE_URL: ${HERMES_LLM_BASE_URL:-https://api.minimaxi.com/v1}
      HERMES_MEMORY_PROVIDER: hindsight
      HERMES_MEMORY_HINDSIGHT_URL: http://127.0.0.1:${HINDSIGHT_PORT:-18888}
      HINDSIGHT_API_URL: http://127.0.0.1:${HINDSIGHT_PORT:-18888}
      HINDSIGHT_API_KEY: local
      HINDSIGHT_LLM_API_KEY: ${HERMES_LLM_API_KEY:-}
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: ${HERMES_PORT:-18080}
      API_SERVER_KEY: ${PLATFORM_HERMES_API_KEY:-}
      API_SERVER_MODEL_NAME: ${PLATFORM_HERMES_MODEL:-hermes-agent}
      HONCHO_BASE_URL: ${HONCHO_BASE_URL:-http://127.0.0.1:${HINDSIGHT_PORT:-18888}}
      PLATFORM_HERMES_MCP_SHARED_TOKEN: ${PLATFORM_HERMES_MCP_SHARED_TOKEN:-git-ai-club-hermes-mcp-token}
    entrypoint:
      - /bin/sh
      - -lc
      - |
        mkdir -p /opt/data
        cat <<EOF > /opt/data/config.yaml
        model:
          provider: minimax-cn
          default: ${HERMES_LLM_MODEL:-MiniMax-M2.7}
        memory:
          provider: hindsight
          hindsight_url: http://127.0.0.1:${HINDSIGHT_PORT:-18888}
        platform_toolsets:
          api_server:
            - git_ai_club
        mcp_servers:
          git_ai_club:
            url: http://127.0.0.1:${CODE_PROCESSING_PORT:-9001}/mcp/
            headers:
              Authorization: Bearer ${PLATFORM_HERMES_MCP_SHARED_TOKEN:-git-ai-club-hermes-mcp-token}
            enabled: true
            tools:
              resources: false
              prompts: false
        EOF
        exec hermes gateway
    command: []
    volumes:
      - "${HERMES_DATA_DIR:-/data/git-ai-club/hermes}:/opt/data"

  code-processing:
    build:
      context: ./code-processing
      dockerfile: Dockerfile
    image: ${CODE_PROCESSING_IMAGE:-git-ai-club-code-processing:latest}
    container_name: git-ai-club-host-code-processing
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      PLATFORM_BACKEND_INTERNAL_BASE_URL: ${PLATFORM_BACKEND_INTERNAL_BASE_URL:-http://127.0.0.1:8087}
      PLATFORM_INTERNAL_SERVICE_TOKEN: ${PLATFORM_INTERNAL_SERVICE_TOKEN:-git-ai-club-internal-service-token}
      PLATFORM_HERMES_MCP_SHARED_TOKEN: ${PLATFORM_HERMES_MCP_SHARED_TOKEN:-git-ai-club-hermes-mcp-token}
      PLATFORM_MINIO_ENDPOINT: ${PLATFORM_MINIO_ENDPOINT:-http://127.0.0.1:19000}
      PLATFORM_MINIO_ACCESS_KEY: ${PLATFORM_MINIO_ACCESS_KEY:-minioadmin}
      PLATFORM_MINIO_SECRET_KEY: ${PLATFORM_MINIO_SECRET_KEY:-minioadmin}
      PLATFORM_MINIO_BUCKET: ${PLATFORM_MINIO_BUCKET:-ai-club-assets}
      PLATFORM_SCAN_WORKSPACE_ROOT: ${PLATFORM_SCAN_WORKSPACE_ROOT:-./.scan-workspace}
      # Host 网络部署同样需要显式透传 CLI 配置，避免容器进程读不到 .env.host 里的值。
      PLATFORM_CODEX_CLI_PATH: ${PLATFORM_CODEX_CLI_PATH:-}
      PLATFORM_CODEX_MODEL_PROVIDER: ${PLATFORM_CODEX_MODEL_PROVIDER:-}
      PLATFORM_CODEX_REASONING_EFFORT: ${PLATFORM_CODEX_REASONING_EFFORT:-low}
      PLATFORM_CLAUDE_CLI_PATH: ${PLATFORM_CLAUDE_CLI_PATH:-}
      PLATFORM_CLAUDE_MODEL: ${PLATFORM_CLAUDE_MODEL:-}
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "${CODE_PROCESSING_PORT:-9001}"
    volumes:
      - "${PLATFORM_SCAN_HOST_PATH:-/data/git-ai-club/scans}:${PLATFORM_SCAN_WORKSPACE_ROOT:-./.scan-workspace}"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-git-ai-club-backend:latest}
    container_name: git-ai-club-host-backend
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      code-processing:
        condition: service_started
      hermes:
        condition: service_started
    environment:
      TZ: ${APP_TZ:-Asia/Shanghai}
      SERVER_PORT: ${BACKEND_PORT:-8087}
      DB_URL: jdbc:postgresql://127.0.0.1:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-ai_agent_platform}
      DB_USERNAME: ${POSTGRES_USER:-aiclub}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-aiclub123}
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      PLATFORM_CODE_PROCESSING_BASE_URL: http://127.0.0.1:${CODE_PROCESSING_PORT:-9001}
      PLATFORM_HERMES_BASE_URL: http://127.0.0.1:${HERMES_PORT:-18080}/v1
      PLATFORM_HERMES_API_KEY: ${PLATFORM_HERMES_API_KEY:-}
      PLATFORM_HERMES_MODEL: ${PLATFORM_HERMES_MODEL:-hermes-agent}
      PLATFORM_HERMES_TIMEOUT_SECONDS: ${PLATFORM_HERMES_TIMEOUT_SECONDS:-180}
      PLATFORM_HERMES_SESSION_PREFIX: ${PLATFORM_HERMES_SESSION_PREFIX:-ai-club:hermes}
      PLATFORM_HERMES_MAX_CONTEXT_MESSAGES: ${PLATFORM_HERMES_MAX_CONTEXT_MESSAGES:-6}
      PLATFORM_HERMES_GROUNDING_TTL_SECONDS: ${PLATFORM_HERMES_GROUNDING_TTL_SECONDS:-86400}
      PLATFORM_INTERNAL_SERVICE_TOKEN: ${PLATFORM_INTERNAL_SERVICE_TOKEN:-git-ai-club-internal-service-token}
      PLATFORM_GITLAB_DEFAULT_API_URL: ${PLATFORM_GITLAB_DEFAULT_API_URL:-http://192.168.110.138:30080/api/v4}
      PLATFORM_GITLAB_OAUTH_CLIENT_ID: ${PLATFORM_GITLAB_OAUTH_CLIENT_ID:-}
      PLATFORM_GITLAB_OAUTH_CLIENT_SECRET: ${PLATFORM_GITLAB_OAUTH_CLIENT_SECRET:-}
      PLATFORM_GITLAB_OAUTH_REDIRECT_URI: ${PLATFORM_GITLAB_OAUTH_REDIRECT_URI:-http://localhost:5173/profile/gitlab-callback}
      PLATFORM_TOKEN_SECRET: ${PLATFORM_TOKEN_SECRET:-ai-club-demo-token-secret}
      PLATFORM_TOKEN_EXPIRE_HOURS: ${PLATFORM_TOKEN_EXPIRE_HOURS:-12}
      PLATFORM_SECURITY_SESSION_KEY_PREFIX: ${PLATFORM_SECURITY_SESSION_KEY_PREFIX:-ai-club:login:token:}
      PLATFORM_MINIO_ENDPOINT: http://127.0.0.1:${MINIO_PORT:-19000}
      PLATFORM_MINIO_ACCESS_KEY: ${PLATFORM_MINIO_ACCESS_KEY:-minioadmin}
      PLATFORM_MINIO_SECRET_KEY: ${PLATFORM_MINIO_SECRET_KEY:-minioadmin}
      PLATFORM_MINIO_BUCKET: ${PLATFORM_MINIO_BUCKET:-ai-club-assets}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.host
      args:
        # Host 网络下前端直接请求宿主机后端端口，不再依赖前端代理。
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-}"
        VITE_API_PORT: "${VITE_API_PORT:-8087}"
    image: ${FRONTEND_IMAGE:-git-ai-club-frontend:latest}
    container_name: git-ai-club-host-frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      backend:
        condition: service_started
    environment:
      NGINX_LISTEN_PORT: ${FRONTEND_PORT:-5173}
      BACKEND_PROXY_URL: http://127.0.0.1:${BACKEND_PORT:-8087}
